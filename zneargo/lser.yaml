# service.yaml
apiVersion: v1
kind: Service
metadata:
  name: n1
  labels:
    app: ma # Matches the high-level label on your Deployment
spec:
  # CRITICAL: This selector must match the Pod labels in your Deployment's template
  selector:
    app: ma
  
  # NodePort is best for Minikube as it exposes the service externally
  type: NodePort
  ports:
    - protocol: TCP
      port: 80       # The port the Service listens on internally
      # CRITICAL: targetPort must match the containerPort (3001)
      targetPort: 80