# Corrected virtualservice.yaml
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: my-backend-vs
  namespace: staging
spec:
  hosts:
    - "*" 
  gateways:
    - istio-system/my-gateway # Check this name
  http:
    - name: primary # CRITICAL: The route name must be 'primary'
      route:
        # Destination 1: The Stable version (initially 100% traffic)
        - destination:
            host: my-backend-service 
            subset: stable          # <-- References the subset defined in DestinationRule
          weight: 100 
        # Destination 2: The Canary version (Rollouts will increase this weight)
        - destination:
            host: my-backend-service
            subset: canary          # <-- References the subset defined in DestinationRule
          weight: 0