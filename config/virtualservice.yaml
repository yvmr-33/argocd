# Corrected virtualservice.yaml
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: my-backend-vs
  namespace: staging
spec:
  hosts:
    - "*" 
  gateways:
    - istio-system/my-gateway # Verify this gateway exists and is correct
  http:
    - name: primary # <--- CRITICAL FIX: Add the route name 'primary'
      route:
        # Initially, this is a standard route pointing to your service. 
        # Argo Rollouts will dynamically modify this 'route' block.
        - destination:
            host: my-backend-service
            subset: stable
          weight: 100 
        - destination:
            host: my-backend-service
            subset: canary
          weight: 0