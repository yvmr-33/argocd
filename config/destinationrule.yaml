# destinationrule.yaml
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: my-backend-rule
  namespace: staging
spec:
  host: my-backend-stable # <--- VERIFY this matches the host in VirtualService
  subsets:
    - name: stable
      labels:
        app: my-backend
        version: v1 
    - name: canary
      labels:
        app: my-backend
        version: v1