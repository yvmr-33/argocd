apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: my-backend-rollout
  namespace: staging
# ... (rest of metadata)
spec:
  replicas: 5
  selector:
    matchLabels:
      # 👇 1. Selector defines the key/value pair
      app: backend 
  template:
    metadata:
      # 👇 2. Template MUST include the exact matching key/value pair
      labels:
        app: backend 
    spec:
      containers:
      # ... (rest of the containers spec)

  strategy:
    canary: 
      # The fields defining the strategy must be placed directly here
      stableService: my-backend-stable
      canaryService: my-backend-canary
      
      trafficRouting:
        istio:
          virtualService:
            name: my-backend-vs
            routes:
              - primary 

      steps:
      - setWeight: 10
      - pause: { duration: 60s }
      - setWeight: 50
      - pause: { duration: 60s }
      - setWeight: 100