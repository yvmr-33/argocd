# Corrected rollout.yaml structure

apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: my-backend-rollout
  namespace: staging
# ... (rest of metadata)
spec:
  replicas: 5
  selector:
    matchLabels:
      app: backend
  template:
# ... (rest of template: labels, containers, image, ports)

  # 👇 THIS IS WHERE THE FIX IS NEEDED!
  strategy:
    # 🛑 The strategy definition MUST be nested here
    canary: 
      # The fields defining the strategy must be placed directly here
      stableService: my-backend-stable
      canaryService: my-backend-canary
      
      trafficRouting:
        istio:
          virtualService:
            name: my-backend-vs
            routes:
              - primary 

      steps:
      - setWeight: 10
      - pause: { duration: 60s }
      - setWeight: 50
      - pause: { duration: 60s }
      - setWeight: 100