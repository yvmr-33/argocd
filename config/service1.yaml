# service.yaml
apiVersion: v1
kind: Service
metadata:
  name: a
  # *** FIX 1: ADD NAMESPACE ***
  namespace: staging # Use the same namespace as your Deployment
  labels:
    app: node-backend-app
spec:
  # This selector must match the Pod labels (app: backend) in your Deployment
  selector:
    app: backend
  
  # NodePort exposes the service externally via a high-numbered port on the node
  type: NodePort
  ports:
    - protocol: TCP
      port: 80       # Port the Service listens on (Cluster-Internal access)
      targetPort: 3000 # Port the container is listening on (Must match your app)