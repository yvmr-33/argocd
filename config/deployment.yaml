# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: a
  # *** FIX 1: ADD NAMESPACE ***
  namespace: staging # Use the namespace you intend to deploy into
  labels:
    app: node-backend-app
spec:
  replicas: 7
  selector:
    matchLabels:
      app: backend # This label must match the label in the template
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: node-backend-container
        # *** VERIFICATION: USE EXPLICIT TAG ***
        image: docker.io/yvmr/argocd1:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000